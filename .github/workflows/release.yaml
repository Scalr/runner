name: Release Runner Image

on:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build args
        id: args
        run: |
          {
            echo 'default<<EOF'
            grep -E '^[A-Z]' versions
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          # Override block for the python39 variant — appended after defaults
          # in the build-args input; later entries win in buildx.
          {
            echo 'python39<<EOF'
            grep -E '^[A-Z]' versions_python39
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Format Image Tag
        id: image_tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" | tee -a $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          build-args: ${{ steps.args.outputs.default }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=scalr/runner:buildcache
          cache-to: type=registry,ref=scalr/runner:buildcache
          push: true
          tags: |
            scalr/runner:latest
            scalr/runner:${{ steps.image_tag.outputs.tag }}

      - name: Build Docker image (Python 3.9)
        uses: docker/build-push-action@v6
        with:
          build-args: |
            ${{ steps.args.outputs.default }}
            ${{ steps.args.outputs.python39 }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=scalr/runner:buildcache-python39
          cache-to: type=registry,ref=scalr/runner:buildcache-python39
          push: true
          tags: |
            scalr/runner:latest-python39
            scalr/runner:${{ steps.image_tag.outputs.tag }}-python39

  update_changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Changelog Generator
        run: gem install github_changelog_generator

      - name: Update CHANGELOG.md
        env:
          CHANGELOG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          github_changelog_generator -u Scalr -p runner --output CHANGELOG.md
          git add CHANGELOG.md
          if [ ! -n "$(git status -s)" ]; then
            echo "NOTHING TO COMMIT"
          else
            git config user.name "${GITHUB_ACTOR}"
            git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
            git commit -m "Update CHANGELOG.md"
            git push --no-verify
          fi
