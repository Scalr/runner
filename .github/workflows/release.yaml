name: Release Runner Image

on:
  push:
    tags:
      - "*.*.*"

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Format Image Tag
        id: image_tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" | tee -a $GITHUB_OUTPUT

      - name: Build and push images
        uses: docker/bake-action@v5
        env:
          VERSION: ${{ steps.image_tag.outputs.tag }}
        with:
          files: |
            docker-bake.hcl
            versions.json
          push: true
          set: |
            full.cache-to=type=registry,ref=scalr/runner:buildcache,mode=max
            python39.cache-to=type=registry,ref=scalr/runner:buildcache-python39,mode=max
            slim.cache-to=type=registry,ref=scalr/runner:buildcache-slim,mode=max

  update_changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Changelog Generator
        run: gem install github_changelog_generator

      - name: Update CHANGELOG.md
        env:
          CHANGELOG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          github_changelog_generator -u Scalr -p runner --output CHANGELOG.md
          git add CHANGELOG.md
          if [ ! -n "$(git status -s)" ]; then
            echo "NOTHING TO COMMIT"
          else
            git config user.name "${GITHUB_ACTOR}"
            git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
            git commit -m "Update CHANGELOG.md"
            git push --no-verify
          fi
